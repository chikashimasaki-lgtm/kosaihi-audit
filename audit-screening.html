<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>監査スクリーニング 汎用版</title>
<style>
  :root{
    --bg:#eef2f6;--panel:#fff;--line:#d7e0e8;--txt:#27313c;--muted:#67768a;
    --accent:#1f5f9e;--accentd:#15436f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Meiryo UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;padding:16px;font-size:14px}
  .wrap{max-width:1100px;margin:0 auto}
  header{background:linear-gradient(135deg,var(--accent),var(--accentd));color:#fff;
    border-radius:12px;padding:16px 20px;border-bottom:3px solid #c8102e;box-shadow:0 2px 8px rgba(20,60,100,.2)}
  header h1{font-size:1.2rem}
  header p{font-size:.78rem;opacity:.9;margin-top:3px}
  .notice{background:#fff7e6;border:1px solid #f0c36d;border-left:4px solid #e0a000;
    border-radius:10px;padding:11px 14px;margin-top:12px;font-size:.82rem;color:#7a5b00;line-height:1.6}
  .notice b{color:#a06a00}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    margin-top:12px;box-shadow:0 1px 3px rgba(20,50,80,.05)}
  .card h2{font-size:.95rem;color:var(--accentd);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cfg{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:.82rem}
  .cfg label{display:flex;align-items:center;gap:6px}
  .cfg input,.cfg select{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:.85rem}
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;
    font-family:ui-monospace,Consolas,monospace;font-size:.76rem;resize:vertical;white-space:pre}
  #def{height:240px}#input{height:120px}
  .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  button{cursor:pointer;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:.85rem;
    background:#fff;color:var(--txt);font-weight:600}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:var(--accentd);color:#fff}
  button.mini{padding:3px 9px;font-size:.76rem}
  .note-s{font-size:.74rem;color:var(--muted);margin-top:6px}
  .crumb{font-size:.8rem;color:var(--muted);margin-bottom:6px}
  .crumb a{color:var(--accent);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .kpi{border-radius:9px;padding:10px;text-align:center;color:#fff}
  .kpi .n{font-size:1.5rem;font-weight:800;line-height:1.1}
  .kpi .l{font-size:.72rem;opacity:.95}
  table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:4px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{background:var(--accentd);color:#fff;position:sticky;top:0;white-space:nowrap}
  .tablewrap{overflow:auto;max-height:420px;border-radius:8px;border:1px solid var(--line)}
  .badge{display:inline-block;padding:2px 8px;border-radius:11px;font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap}
  .flags{font-size:.72rem;color:#d8443b}
  .conf{border:1px solid var(--line);border-left:4px solid #d8443b;border-radius:8px;

  .err{color:#d8443b;font-size:.78rem;margin-top:6px;white-space:pre-wrap}
  .child{display:inline-block;border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin:4px 6px 0 0;cursor:pointer;font-size:.78rem;background:#f7fafd}

  footer{color:var(--muted);font-size:.72rem;text-align:center;margin-top:16px}
  .legend{font-size:.72rem;color:var(--muted);margin-top:6px;line-height:1.6}
  code{background:#eef2f6;padding:1px 5px;border-radius:4px;font-family:Consolas,monospace}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛡️ 監査スクリーニング 汎用版</h1>
  </header>

  <div class="notice">
    ⚠ <b>デモアプリ</b>。判定はすべて<b>端末内のルールベース計算</b>で行い、<b>AI・外部APIは不使用</b>。入力データは外部送信されません。
  </div>

  <div class="card">
    <h2>📚 ルールセット（ライブラリ）</h2>
    <div class="cfg">
      <label>選択 <select id="selSet" onchange="onSelect()"></select></label>
      <label>監査対象組織 <input id="cfgOrg" type="text" value="営業本部" style="width:180px" oninput="reRender()"></label>
    </div>
    <div class="crumb" id="crumb"></div>
  </div>

  <div class="card">
    <h2>⚙️ ルールセット定義（JSON・編集可）</h2>
    <textarea id="def" spellcheck="false" placeholder='{
  "theme": "（監査テーマ）",
  "levels": ["適正","注意","要改善(軽微)","要改善"],
  "columns": ["ID","項目","金額","承認者"],
  "display": ["ID","項目","金額"],
  "rules": [
    { "name":"高額", "when":"金額 > 100000", "level":"要改善(軽微)", "question":"理由をご回答ください。" },
    { "name":"承認なし", "when":"empty(承認者)", "level":"要改善", "question":"承認手続をご説明ください。" }
  ]
}
使える関数: inc(列,"語") / empty(列) / N(列) / days(a,b) / any(列,"語1","語2") / per(税込,人数,インボイス)
roles・template・parent も任意で指定可。'></textarea>
    <div class="btns">
      <button onclick="applyDef()">✅ 定義を適用</button>
    </div>
    <div id="defErr" class="err"></div>
  </div>

  <div class="card">
    <h2>📥 入力データ（タブ／カンマ区切り・1行1件）</h2>
    <div class="note-s" id="colHint">列順: （定義適用後に表示）</div>
    <textarea id="input" spellcheck="false"></textarea>
    <div class="btns">
      <button class="primary" onclick="runAudit()">🔍 監査実行</button>
      <label class="mini" style="display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer">⬆ CSV取込<input type="file" accept=".csv,.txt" style="display:none" onchange="loadCsv(event)"></label>
      <button onclick="document.getElementById('input').value=''">クリア</button>
      <button onclick="downloadCsv()">⬇ 結果CSV</button>
    </div>
  </div>

  <div id="out"></div>

  <footer>本ツールは一次スクリーニング用。最終判定は専門家・原資料で確認してください。</footer>
</div>

<script>
// ===== 共通ヘルパー＆定数 =====
const HELP_NAMES=["inc","empty","N","days","any","per"];
function getHelpers(){return{
  inc:(s,sub)=>String(s==null?'':s).includes(sub),
  empty:(s)=>!String(s==null?'':s).trim(),
  N:(s)=>Number(String(s==null?'':s).replace(/[,\s]/g,''))||0,
  days:(a,b)=>{const d=Math.round((new Date(a)-new Date(b))/86400000);return isNaN(d)?0:d;},
  // いずれかの語を含むか
  any:(s,...subs)=>subs.some(x=>String(s==null?'':s).includes(x)),
  // 監査用税抜の1人あたり額（税率10%・未登録は経過措置で控除不可20%上乗せ）
  per:(gross,ppl,inv)=>{const g=Number(gross)||0;const body=Math.round(g/1.1);const vat=g-body;
    const te=String(inv==null?'':inv).includes('未')?body+Math.round(vat*0.2):body;const p=Number(ppl)||1;return te/(p||1);}
};}
const DEFAULT_LEVELS=["適正","注意","要改善(軽微)","要改善"];

const BYID={}; LIBRARY.forEach(d=>BYID[d.id]=d);

// ===== エンジン =====
let CTX=null, RESULTS=[], CONFIRMATIONS=[];

function resolveRules(def){
  const t=(def.template&&TEMPLATES[def.template])?TEMPLATES[def.template]:[];
  return [...t,...(def.rules||[])];
}
function compileDef(def){
  const cols=def.columns.slice();
  const levels=(def.levels&&def.levels.length)?def.levels.slice():DEFAULT_LEVELS.slice();
  const roleMap=def.roles||{}; const roleKeys=Object.keys(roleMap);
  const rules=resolveRules(def);
  const argNames=[...cols,'role',...HELP_NAMES];
  const compiled=rules.map(r=>{
    if(!r.when) return {rule:r,fn:()=>false};
    if(!levels.includes(r.level)) throw new Error("level「"+r.level+"」がlevelsに未定義（ルール: "+(r.name||'')+"）");
    return {rule:r,fn:new Function(...argNames,'return ('+r.when+');')};
  });
  // role参照先の列が存在するか検査
  roleKeys.forEach(k=>{ if(!cols.includes(roleMap[k])) throw new Error("roles."+k+" の参照列「"+roleMap[k]+"」がcolumnsにありません"); });
  const display=(def.display&&def.display.length)?def.display.slice():cols.slice();
  return {def,cols,levels,roleMap,roleKeys,compiled,display,theme:def.theme||'監査スクリーニング'};
}
function coerce(v){const t=String(v==null?'':v).trim();return (t!==''&&/^-?\d+(\.\d+)?$/.test(t))?Number(t):v;}
function buildArgs(ctx,row){
  const h=getHelpers();
  const vals=ctx.cols.map(c=>coerce(row[c]));
  const role={}; ctx.roleKeys.forEach(k=>role[k]=coerce(row[ctx.roleMap[k]]));
  return [...vals,role,...HELP_NAMES.map(n=>h[n])];
}
function auditRow(ctx,row){
  const args=buildArgs(ctx,row); const matched=[];
  ctx.compiled.forEach(c=>{let hit;try{hit=!!c.fn(...args);}catch(e){hit=false;}if(hit)matched.push(c.rule);});
  let grade=ctx.levels[0],gi=0;
  matched.forEach(r=>{const k=ctx.levels.indexOf(r.level);if(k>gi){gi=k;grade=r.level;}});
  return {row,matched,grade,flags:matched.map(r=>r.name),questions:matched.filter(r=>r.question).map(r=>r.question)};
}
function runRows(ctx,rows){return rows.map(r=>auditRow(ctx,r));}
function rowsFromData(ctx,data){return data.map(arr=>{const o={};ctx.cols.forEach((c,i)=>o[c]=arr[i]);return o;});}

// ===== 色（可変レベル対応）=====
function colorFor(idx,total){ if(idx<=0)return '#2f9e5f'; if(idx>=total-1)return '#d8443b'; if(idx===total-2)return '#e0a000'; return '#2b7fd0'; }
function lightFor(idx,total){ if(idx<=0)return ''; if(idx>=total-1)return '#fdecea'; if(idx===total-2)return '#fdf6e3'; return '#eaf3fc'; }

// ===== UI：選択・定義 =====
function depthOf(d){ let n=0,cur=d; while(cur&&cur.parent&&BYID[cur.parent]){ n++; cur=BYID[cur.parent]; } return n; }
function buildSelect(){
  const sel=document.getElementById('selSet'); sel.innerHTML='';
  const blank=document.createElement('option'); blank.value=''; blank.textContent='（カスタム：下の定義JSONを直接編集）';
  sel.appendChild(blank);
  LIBRARY.forEach(d=>{
    const o=document.createElement('option'); o.value=d.id;
    const dep=depthOf(d);
    o.textContent=(dep?'　'.repeat(dep)+'└ ':'')+d.id+'  —  '+d.theme;
    sel.appendChild(o);
  });
}
function defWithoutData(def){const {data, ...rest}=def; return rest;}
function clearAll(){
  CTX=null; RESULTS=[];
  document.getElementById('def').value='';
  document.getElementById('input').value='';
  document.getElementById('colHint').textContent='列順: （定義適用後に表示）';
  document.getElementById('crumb').innerHTML='';
  document.getElementById('defErr').textContent='';
  document.getElementById('out').innerHTML='<div class="card note-s">ライブラリから選ぶか、上の「定義JSON」を記述して「✅ 定義を適用」→「🔍 監査実行」してください。</div>';
}
function onSelect(){
  const v=document.getElementById('selSet').value;
  if(!v){ clearAll(); return; }
  loadRuleset(v);
}
function loadRuleset(id){
  const def=BYID[id]; if(!def) return;
  document.getElementById('def').value=JSON.stringify(defWithoutData(def),null,2);
  document.getElementById('input').value=(def.data||[]).map(r=>r.join('\t')).join('\n');
  document.getElementById('selSet').value=id;
  applyDef();
  // 定義の読み込みのみ。結果は「監査実行」を押すまで表示しない
  RESULTS=[]; document.getElementById('out').innerHTML='<div class="card note-s">「🔍 監査実行」を押すと判定結果を表示します。</div>';
}
function applyDef(){
  const errBox=document.getElementById('defErr'); errBox.textContent='';
  let def;
  try{ def=JSON.parse(document.getElementById('def').value); }
  catch(e){ errBox.textContent='JSON構文エラー: '+e.message; return false; }
  if(!Array.isArray(def.columns)||!def.columns.length){ errBox.textContent='columns（列名配列）が必要です。'; return false; }
  try{ CTX=compileDef(def); }catch(e){ errBox.textContent=e.message; return false; }
  document.getElementById('colHint').textContent='列順: '+CTX.cols.join(', ')
    +(CTX.roleKeys.length?'　／ roles: '+CTX.roleKeys.map(k=>k+'→'+CTX.roleMap[k]).join(', '):'')
    +(def.template?'　／ template: '+def.template:'');
  renderCrumb();
  errBox.style.color='var(--ok,#2f9e5f)'; errBox.textContent='✔ 定義を適用しました（ルール'+CTX.compiled.length+'件・レベル'+CTX.levels.length+'段階）';
  setTimeout(()=>{errBox.textContent='';errBox.style.color='';},2500);
  return true;
}

// ===== ④ パンくず＆階層 =====
function renderCrumb(){
  const c=document.getElementById('crumb');
  const id=CTX&&CTX.def&&CTX.def.id;
  if(!id||!BYID[id]){ c.innerHTML='<i>カスタム定義</i>'; return; }
  const chain=[]; let cur=BYID[id];
  while(cur){ chain.unshift(cur); cur=cur.parent?BYID[cur.parent]:null; }
  c.innerHTML='階層: '+chain.map((d,i)=> i<chain.length-1
    ? `<a onclick="loadRuleset('${d.id}')">${d.id}</a>` : `<b>${d.id}</b>`).join(' ＞ ');
}

// ===== 監査実行＆描画 =====
function parseInput(){
  const lines=document.getElementById('input').value.trim().split('\n').filter(l=>l.trim());
  return lines.map(l=>{const c=l.includes('\t')?l.split('\t'):l.split(',');const o={};CTX.cols.forEach((k,i)=>o[k]=(c[i]||'').trim());return o;});
}
function runAudit(){
  if(!CTX){ if(!applyDef()) return; }
  const rows=parseInput();
  const out=document.getElementById('out');
  if(!rows.length){ out.innerHTML='<div class="card">データがありません。</div>'; return; }
  RESULTS=runRows(CTX,rows);
  render();
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const org=document.getElementById('cfgOrg').value||'';
  const theme=CTX.theme, levels=CTX.levels, total=levels.length;
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'});
  const cnt={}; levels.forEach(l=>cnt[l]=0); RESULTS.forEach(a=>cnt[a.grade]++);

  // サマリー
  let h=`<div class="card"><h2>📊 監査結果サマリー（${RESULTS.length}件）<span style="font-weight:400;font-size:.78rem;color:var(--muted)">／ ${esc(theme)}</span></h2><div class="dash">`;
  h+=`<div class="kpi" style="background:#54657a"><div class="n">${RESULTS.length}</div><div class="l">総件数</div></div>`;
  levels.forEach((l,i)=>{ h+=`<div class="kpi" style="background:${colorFor(i,total)}"><div class="n">${cnt[l]}</div><div class="l">${esc(l)}</div></div>`; });
  h+=`</div></div>`;

  // ④ 階層ロールアップ（子ルールセットがあれば集約評価を表示）
  const id=CTX.def.id;
  const children=id?LIBRARY.filter(d=>d.parent===id):[];
  if(children.length){
    h+=`<div class="card"><h2>🧭 階層ロールアップ（子項目の集約）</h2><div class="tablewrap"><table><thead><tr><th>子ルールセット</th><th>件数</th><th>集約評価（最悪値）</th><th>内訳</th><th></th></tr></thead><tbody>`;
    children.forEach(cd=>{
      let cx; try{ cx=compileDef(cd); }catch(e){ return; }
      const res=runRows(cx,rowsFromData(cx,cd.data||[]));
      const cc={}; cx.levels.forEach(l=>cc[l]=0); res.forEach(a=>cc[a.grade]++);
      let worst=cx.levels[0],wi=0; res.forEach(a=>{const k=cx.levels.indexOf(a.grade);if(k>wi){wi=k;worst=a.grade;}});
      const breakdown=cx.levels.map(l=>l+':'+cc[l]).join('  ');
      h+=`<tr><td>${esc(cd.theme)}<br><span style="color:var(--muted);font-size:.72rem">${cd.id}</span></td>
        <td style="text-align:right">${res.length}</td>
        <td><span class="badge" style="background:${colorFor(wi,cx.levels.length)}">${esc(worst)}</span></td>
        <td style="font-size:.72rem">${esc(breakdown)}</td>
        <td><button class="mini" onclick="loadRuleset('${cd.id}')">開く ▶</button></td></tr>`;
    });
    h+=`</tbody></table></div><div class="note-s">※ 親の評価は子の最悪値で集約。各子は自身のサンプルデータで評価しています。</div></div>`;
  }

  // 判定一覧（display列）
  const idCol=CTX.cols[0]; const dispCols=CTX.display.filter(c=>c!==idCol);
  h+=`<div class="card"><h2>📋 判定一覧</h2><div class="tablewrap"><table><thead><tr><th>${esc(idCol)}</th><th>評価</th>`;
  dispCols.forEach(c=>h+=`<th>${esc(c)}</th>`); h+=`<th>検知フラグ</th></tr></thead><tbody>`;
  RESULTS.forEach(a=>{
    const gi=levels.indexOf(a.grade);
    h+=`<tr style="background:${lightFor(gi,total)}"><td>${esc(a.row[idCol])}</td><td><span class="badge" style="background:${colorFor(gi,total)}">${esc(a.grade)}</span></td>`;
    dispCols.forEach(c=>h+=`<td>${esc(a.row[c])}</td>`);
    h+=`<td>${a.flags.length?`<span class="flags">${a.flags.map(esc).join('、')}</span>`:'<span style="color:#2f9e5f">✔ 適正</span>'}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;

  // 確認書（疑義＝最良レベル以外）
  const flagged=RESULTS.filter(a=>a.grade!==levels[0]);
  h+=`<div class="card"><h2>🧾 監査内容確認書（疑義 ${flagged.length}件・適正は自動スルー）</h2>`;
  if(flagged.length) h+=`<div class="btns"><button onclick="downloadConfCsv()">⬇ 確認書CSV</button><button onclick="downloadConfExcel()">⬇ 確認書Excel</button></div>`;
  if(!flagged.length) h+='<div class="note-s">疑義案件はありません。</div>';
  CONFIRMATIONS=[];
  flagged.forEach(a=>{
    const r=a.row, gi=levels.indexOf(a.grade);
    const qs=a.questions.length?a.questions.slice():['本案件の内容・経緯について補足の説明をご回答ください。'];
    const detail=CTX.cols.map(c=>`${c}：${r[c]||'（空欄）'}`).join(' ／ ');
    CONFIRMATIONS.push({date:today,theme,org,id:r[idCol],grade:a.grade,flags:a.flags.join('、'),detail,questions:qs.slice()});
    const ANS='\n      ご回答：______________________________________________';
    h+=`<div class="conf" style="border-left-color:${colorFor(gi,total)}"><div class="ch">【監査内容確認書（被監査部門 ご回答用）】 ${esc(theme)}</div>`+
`■ 1. 対象案件
  確認書発行日：${today}　／　発行：内部監査部
  監査対象組織：${esc(org)||'（　　　　　　　　）'}
  対象ID：${esc(r[idCol])}
  案件内容：${esc(detail)}

■ 2. 監査人の所見
  総合評価：${esc(a.grade)}　／　指摘区分：${esc(a.flags.join('、'))}

■ 3. ご確認・ご回答いただきたい事項（被監査部門ご記入）
${qs.map((x,i)=>`  Q${i+1}. ${esc(x)}${ANS}`).join('\n\n')}

■ 4. ご提示をお願いする証跡（該当に☑）
  □ 証憑（規程・台帳・記録等）　□ 承認・決裁記録　□ 関連資料（議事録・計画書等）

ご回答期限：　　　年　　月　　日　／　ご回答者（所属・氏名）：________________</div>`;
  });
  h+=`</div>`;
  document.getElementById('out').innerHTML=h;
}

// ===== 入出力 =====
function reRender(){ if(RESULTS.length) render(); }
function loadCsv(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ document.getElementById('input').value=String(rd.result).replace(/^﻿/,'').trim();
    RESULTS=[]; document.getElementById('out').innerHTML='<div class="card note-s">CSVを取り込みました。「🔍 監査実行」を押すと判定結果を表示します。</div>'; };
  rd.readAsText(f,'UTF-8'); ev.target.value='';
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function downloadCsv(){
  if(!RESULTS.length){ alert('先に監査を実行してください'); return; }
  const head=[...CTX.cols,'総合評価','検知フラグ'];
  const rows=RESULTS.map(a=>[...CTX.cols.map(c=>a.row[c]),a.grade,a.flags.join('；')]);
  const csv='﻿'+[head,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'screening_results.csv');
}
function downloadConfCsv(){
  if(!CONFIRMATIONS.length){ alert('疑義案件がありません'); return; }
  const head=['確認書発行日','監査テーマ','対象ID','監査対象組織','総合評価','指摘区分','案件内容','質問No','質問内容','ご回答','回答期限','ご回答者','提示証跡'];
  const ev='□証憑 □承認記録 □関連資料'; const rows=[];
  CONFIRMATIONS.forEach(c=>c.questions.forEach((q,i)=>rows.push([c.date,c.theme,c.id,c.org,c.grade,c.flags,c.detail,'Q'+(i+1),q,'','','',i===0?ev:''])));
  const csv='﻿'+[head,...rows].map(r=>r.map(x=>`"${String(x==null?'':x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'監査内容確認書.csv');
}
function downloadConfExcel(){
  if(!CONFIRMATIONS.length){ alert('疑義案件がありません'); return; }
  const row=(k,v)=>`<tr><td style="background:#f1f5fa;font-weight:bold;white-space:nowrap">${esc(k)}</td><td>${esc(v)}</td></tr>`;
  let t='';
  CONFIRMATIONS.forEach(c=>{
    t+=`<tr><td colspan="2" style="background:#15436f;color:#fff;font-weight:bold;font-size:12pt">監査内容確認書　${esc(c.theme)}　${esc(c.id)}　［${esc(c.grade)}］</td></tr>`;
    t+=row('確認書発行日',c.date+' ／ 発行：内部監査部');
    t+=row('監査対象組織',c.org);
    t+=row('対象ID',c.id);
    t+=row('案件内容',c.detail);
    t+=row('総合評価／指摘区分',c.grade+' ／ '+c.flags);
    t+=`<tr><td colspan="2" style="background:#dde7f0;font-weight:bold">ご確認・ご回答いただきたい事項</td></tr>`;
    c.questions.forEach((q,i)=>t+=`<tr><td style="vertical-align:top;width:58%">Q${i+1}. ${esc(q)}</td><td style="height:54px;background:#fffdf2">ご回答：</td></tr>`);
    t+=`<tr><td colspan="2">提示証跡：□ 証憑　□ 承認記録　□ 関連資料</td></tr>`;
    t+=`<tr><td>ご回答期限：　　　年　　月　　日</td><td>ご回答者（所属・氏名）：</td></tr>`;
    t+=`<tr><td colspan="2" style="border:none;height:10px"></td></tr>`;
  });
  const html=`<html><head><meta charset="utf-8"><style>table{border-collapse:collapse}td{border:1px solid #b8c4d0;padding:5px 8px;font-size:10.5pt;font-family:'Meiryo UI','Yu Gothic',sans-serif;vertical-align:top}</style></head><body><table>${t}</table></body></html>`;
  dl(new Blob(['﻿'+html],{type:'application/vnd.ms-excel'}),'監査内容確認書.xls');
}

// ===== 初期化 =====
buildSelect();
document.getElementById('selSet').value='';
clearAll();
</script>
