<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内部監査 品質評価（内部評価）スクリーニング</title>
<style>
  :root{ --bg:#eef2f6;--panel:#fff;--line:#d7e0e8;--txt:#27313c;--muted:#67768a;--accent:#1f5f9e;--accentd:#15436f; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Meiryo UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);line-height:1.55;padding:16px;font-size:14px}
  .wrap{max-width:1100px;margin:0 auto}
  header{background:linear-gradient(135deg,var(--accent),var(--accentd));color:#fff;border-radius:12px;padding:16px 20px;border-bottom:3px solid #c8102e;box-shadow:0 2px 8px rgba(20,60,100,.2)}
  header h1{font-size:1.15rem}
  .notice{background:#fff7e6;border:1px solid #f0c36d;border-left:4px solid #e0a000;border-radius:10px;padding:11px 14px;margin-top:12px;font-size:.82rem;color:#7a5b00;line-height:1.6}
  .notice b{color:#a06a00}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;box-shadow:0 1px 3px rgba(20,50,80,.05)}
  .card h2{font-size:.95rem;color:var(--accentd);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cfg{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:.82rem}
  .cfg label{display:flex;align-items:center;gap:6px}
  .cfg input,.cfg select{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:.85rem}
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:ui-monospace,Consolas,monospace;font-size:.76rem;resize:vertical;white-space:pre}
  #def{height:240px}#input{height:120px}
  .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  button{cursor:pointer;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:.85rem;background:#fff;color:var(--txt);font-weight:600}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:var(--accentd);color:#fff}
  button.mini{padding:3px 9px;font-size:.76rem}
  .note-s{font-size:.74rem;color:var(--muted);margin-top:6px}
  .crumb{font-size:.8rem;color:var(--muted);margin-bottom:6px}
  .crumb a{color:var(--accent);cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .kpi{border-radius:9px;padding:10px;text-align:center;color:#fff}
  .kpi .n{font-size:1.5rem;font-weight:800;line-height:1.1}.kpi .l{font-size:.72rem;opacity:.95}
  table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:4px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{background:var(--accentd);color:#fff;position:sticky;top:0;white-space:nowrap}
  .tablewrap{overflow:auto;max-height:440px;border-radius:8px;border:1px solid var(--line)}
  .badge{display:inline-block;padding:2px 8px;border-radius:11px;font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap}
  .flags{font-size:.72rem;color:#d8443b}
  .conf{border:1px solid var(--line);border-left:4px solid #d8443b;border-radius:8px;padding:12px 14px;margin-top:10px;background:#fff;font-size:.82rem;white-space:pre-wrap}
  .conf .ch{font-weight:700;color:var(--accentd);font-size:.9rem;margin-bottom:6px}
  .err{color:#d8443b;font-size:.78rem;margin-top:6px;white-space:pre-wrap}
  footer{color:var(--muted);font-size:.72rem;text-align:center;margin-top:16px}
  code{background:#eef2f6;padding:1px 5px;border-radius:4px;font-family:Consolas,monospace}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛡️ 内部監査 品質評価（内部評価）スクリーニング</h1>
  </header>

  <div class="notice">
    ⚠ <b>デモアプリ</b>。グローバル内部監査基準（5ドメイン・15原則）への適合性の一次スクリーニング。判定は<b>端末内のルールベース計算</b>のみ（<b>AI・外部API不使用</b>）。最終的な品質評価の結論付けは評価者の判断によります。
  </div>

  <div class="card">
    <h2>📚 評価対象（階層ライブラリ）</h2>
    <div class="cfg">
      <label>選択 <select id="selSet" onchange="onSelect()"></select></label>
      <label>評価対象 <input id="cfgOrg" type="text" value="内部監査部門" style="width:200px" oninput="reRender()"></label>
    </div>
    <div class="crumb" id="crumb"></div>
  </div>

  <div class="card">
    <h2>⚙️ 評価ルール定義（JSON・編集可）</h2>
    <textarea id="def" spellcheck="false"></textarea>
    <div class="btns"><button onclick="applyDef()">✅ 定義を適用</button></div>
    <div id="defErr" class="err"></div>
  </div>

  <div class="card">
    <h2>📥 評価データ（タブ／カンマ区切り・1行1項目）</h2>
    <div class="note-s" id="colHint">列順: （定義適用後に表示）</div>
    <textarea id="input" spellcheck="false"></textarea>
    <div class="btns">
      <button class="primary" onclick="runAudit()">🔍 評価実行</button>
      <label class="mini" style="display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer">⬆ CSV取込<input type="file" accept=".csv,.txt" style="display:none" onchange="loadCsv(event)"></label>
      <button onclick="document.getElementById('input').value=''">クリア</button>
      <button onclick="downloadCsv()">⬇ 結果CSV</button>
    </div>
  </div>

  <div id="out"></div>
  <footer>本ツールは内部評価の一次スクリーニング用。品質評価マニュアル（2024年版）に基づく最終結論は評価者が判断してください。</footer>
</div>

<script>
// ===== 共通ヘルパー =====
const HELP_NAMES=["inc","empty","N","days","any"];
function getHelpers(){return{
  inc:(s,sub)=>String(s==null?'':s).includes(sub),
  empty:(s)=>!String(s==null?'':s).trim(),
  N:(s)=>Number(String(s==null?'':s).replace(/[,\s]/g,''))||0,
  days:(a,b)=>{const d=Math.round((new Date(a)-new Date(b))/86400000);return isNaN(d)?0:d;},
  any:(s,...subs)=>subs.some(x=>String(s==null?'':s).includes(x))
};}
const DEFAULT_LEVELS=["全般的に適合","部分的に適合","不適合"];

// ===== 共通テンプレート（品質評価：roles参照）=====
const TEMPLATES={
 "品質評価v1":[
  {name:"不適合（要求事項の未充足）",when:"role.req=='未充足'",level:"不適合",
   question:"当該基準・原則の要求事項（must）が充足されていません。未充足の内容と是正計画（責任者・時期）をご回答ください。"},
  {name:"部分的に適合（要求事項が一部）",when:"role.req=='一部'",level:"部分的に適合",
   question:"要求事項の充足が一部にとどまっています。未充足の範囲と改善の方向性をご回答ください。"},
  {name:"適合の証拠が不十分",when:"role.evid=='無'",level:"部分的に適合",
   question:"適合を示す証拠（規程・調書・記録等）が整備・保存されていません。証拠の有無と整備予定をご回答ください。"},
  {name:"自己評価が未実施",when:"role.selfassess=='未'",level:"部分的に適合",
   question:"定期的自己評価（継続的モニタリングを含む）が未実施です。実施予定時期と実施体制をご回答ください。"},
  {name:"改善措置が未着手",when:"role.action=='未着手'",level:"部分的に適合",
   question:"指摘に対する改善措置が未着手です。改善計画（内容・責任者・期限）をご回答ください。"},
  {name:"評価が未実施",when:"empty(role.date)",level:"部分的に適合",
   question:"当該項目の評価（最終評価日）が記録されていません。直近の評価状況をご回答ください。"}
 ]
};

// ===== 共通スキーマ =====
const LV=["全般的に適合","部分的に適合","不適合"];
const COLS=["原則番号","区分","評価項目","キー項目","要求事項の充足","証拠の整備","自己評価","改善措置","最終評価日","結論"];
const DISP=["原則番号","区分","評価項目","要求事項の充足","証拠の整備","改善措置"];
const ROLES={req:"要求事項の充足",evid:"証拠の整備",selfassess:"自己評価",action:"改善措置",date:"最終評価日"};
function node(o){return Object.assign({levels:LV,template:"品質評価v1",roles:ROLES,columns:COLS,display:DISP},o);}

// 全体（Ⅰ＋15原則）
const ALL=[
 ["Ⅰ","Ⅰ 内部監査の目的","内部監査の目的の理解と推進","Y","充足","有","済","不要","2026-05-01","全般的に適合"],
 ["1","Ⅱ 倫理と専門職としての気質","誠実性を示す","Y","充足","有","済","不要","2026-05-02","全般的に適合"],
 ["2","Ⅱ 倫理と専門職としての気質","客観性を保持する","Y","一部","有","済","計画中","2026-05-03",""],
 ["3","Ⅱ 倫理と専門職としての気質","専門的能力を示す","N","充足","有","済","不要","2026-05-04","全般的に適合"],
 ["4","Ⅱ 倫理と専門職としての気質","正当な専門職としての注意を払う","N","充足","無","済","不要","2026-05-05",""],
 ["5","Ⅱ 倫理と専門職としての気質","機密を保持する","N","充足","有","済","不要","2026-05-06","全般的に適合"],
 ["6","Ⅲ 内部監査に対するガバナンス","取締役会による承認（内部監査基本規程）","Y","充足","有","済","不要","2026-05-07","全般的に適合"],
 ["7","Ⅲ 内部監査に対するガバナンス","組織上の適切な位置づけ（独立性）","Y","一部","有","未","計画中","2026-05-08",""],
 ["8","Ⅲ 内部監査に対するガバナンス","取締役会による監督","Y","充足","有","済","不要","2026-05-09","全般的に適合"],
 ["9","Ⅳ 内部監査部門の管理","戦略的に計画する（監査計画）","Y","充足","有","済","不要","2026-05-10","全般的に適合"],
 ["10","Ⅳ 内部監査部門の管理","資源を管理する（要員・予算・技術）","N","未充足","無","未","未着手","",""],
 ["11","Ⅳ 内部監査部門の管理","効果的にコミュニケーションする","N","充足","有","済","不要","2026-05-12","全般的に適合"],
 ["12","Ⅳ 内部監査部門の管理","品質の向上（QAIP・内部評価）","Y","一部","有","未","計画中","2026-05-13",""],
 ["13","Ⅴ 内部監査業務の実施","個々の業務を効果的に計画する","Y","充足","有","済","不要","2026-05-14","全般的に適合"],
 ["14","Ⅴ 内部監査業務の実施","内部監査業務を実施する（証拠・文書化）","Y","一部","有","済","計画中","2026-05-15",""],
 ["15","Ⅴ 内部監査業務の実施","結論の伝達と改善措置のモニタリング","Y","未充足","無","未","未着手","",""]
];

// ===== ライブラリ（全体 → 5ドメイン → 原則の基準別：3階層）=====
const LIBRARY=[
 node({id:"ia-all",parent:null,theme:"内部監査 品質の内部評価（全体・5ドメイン15原則）",data:ALL}),

 node({id:"ia-d1",parent:"ia-all",theme:"ドメインⅠ 内部監査の目的",data:ALL.slice(0,1)}),
 node({id:"ia-d2",parent:"ia-all",theme:"ドメインⅡ 倫理と専門職としての気質（原則1-5）",data:ALL.slice(1,6)}),
 node({id:"ia-d3",parent:"ia-all",theme:"ドメインⅢ ガバナンス（原則6-8）",data:ALL.slice(6,9)}),
 node({id:"ia-d4",parent:"ia-all",theme:"ドメインⅣ 内部監査部門の管理（原則9-12）",data:ALL.slice(9,13)}),
 node({id:"ia-d5",parent:"ia-all",theme:"ドメインⅤ 内部監査業務の実施（原則13-15）",data:ALL.slice(13,16)}),

 // --- 原則の基準別（さらに細かい子階層）---
 node({id:"ia-p8",parent:"ia-d3",theme:"原則8 取締役会による監督（基準別）",data:[
   ["8.3","原則8 取締役会による監督","品質（QAIPの整備・内部評価の枠組み）","Y","充足","有","済","不要","2026-05-09","全般的に適合"],
   ["8.4","原則8 取締役会による監督","品質の外部評価（少なくとも5年ごと）","Y","一部","有","未","計画中","2026-05-09",""]
 ]}),
 node({id:"ia-p12",parent:"ia-d4",theme:"原則12 品質の向上（基準別）",data:[
   ["12.1","原則12 品質の向上","品質の内部評価（継続的モニタリング・定期的自己評価）","Y","一部","有","未","計画中","2026-05-13",""],
   ["12.2","原則12 品質の向上","パフォーマンスの測定（KPI／KRI）","N","充足","有","済","不要","2026-05-13","全般的に適合"],
   ["12.3","原則12 品質の向上","個々の内部監査業務のパフォーマンスの監督及び改善","Y","充足","無","済","不要","2026-05-13",""]
 ]}),
 node({id:"ia-p15",parent:"ia-d5",theme:"原則15 結論の伝達・改善措置のモニタリング（基準別）",data:[
   ["15.1","原則15 結論の伝達等","個々の内部監査業務の最終的なコミュニケーション","Y","未充足","無","未","未着手","",""],
   ["15.2","原則15 結論の伝達等","改善措置の計画の実施状況のモニタリング","Y","一部","有","済","計画中","2026-05-15",""]
 ]})
];
const BYID={}; LIBRARY.forEach(d=>BYID[d.id]=d);

// ===== エンジン =====
let CTX=null, RESULTS=[], CONFIRMATIONS=[];
function resolveRules(def){const t=(def.template&&TEMPLATES[def.template])?TEMPLATES[def.template]:[];return [...t,...(def.rules||[])];}
function compileDef(def){
  const cols=def.columns.slice();
  const levels=(def.levels&&def.levels.length)?def.levels.slice():DEFAULT_LEVELS.slice();
  const roleMap=def.roles||{}; const roleKeys=Object.keys(roleMap);
  const rules=resolveRules(def); const argNames=[...cols,'role',...HELP_NAMES];
  const compiled=rules.map(r=>{
    if(!r.when) return {rule:r,fn:()=>false};
    if(!levels.includes(r.level)) throw new Error("level「"+r.level+"」がlevelsに未定義（ルール: "+(r.name||'')+"）");
    return {rule:r,fn:new Function(...argNames,'return ('+r.when+');')};
  });
  roleKeys.forEach(k=>{ if(!cols.includes(roleMap[k])) throw new Error("roles."+k+" の参照列「"+roleMap[k]+"」がcolumnsにありません"); });
  const display=(def.display&&def.display.length)?def.display.slice():cols.slice();
  return {def,cols,levels,roleMap,roleKeys,compiled,display,theme:def.theme||'品質評価'};
}
function coerce(v){const t=String(v==null?'':v).trim();return (t!==''&&/^-?\d+(\.\d+)?$/.test(t))?Number(t):v;}
function buildArgs(ctx,row){const h=getHelpers();const vals=ctx.cols.map(c=>coerce(row[c]));const role={};ctx.roleKeys.forEach(k=>role[k]=coerce(row[ctx.roleMap[k]]));return [...vals,role,...HELP_NAMES.map(n=>h[n])];}
function auditRow(ctx,row){const args=buildArgs(ctx,row);const matched=[];
  ctx.compiled.forEach(c=>{let hit;try{hit=!!c.fn(...args);}catch(e){hit=false;}if(hit)matched.push(c.rule);});
  let grade=ctx.levels[0],gi=0; matched.forEach(r=>{const k=ctx.levels.indexOf(r.level);if(k>gi){gi=k;grade=r.level;}});
  return {row,matched,grade,flags:matched.map(r=>r.name),questions:matched.filter(r=>r.question).map(r=>r.question)};}
function runRows(ctx,rows){return rows.map(r=>auditRow(ctx,r));}
function rowsFromData(ctx,data){return data.map(arr=>{const o={};ctx.cols.forEach((c,i)=>o[c]=arr[i]);return o;});}
function colorFor(idx,total){ if(idx<=0)return '#2f9e5f'; if(idx>=total-1)return '#d8443b'; if(idx===total-2)return '#e0a000'; return '#2b7fd0'; }
function lightFor(idx,total){ if(idx<=0)return ''; if(idx>=total-1)return '#fdecea'; if(idx===total-2)return '#fdf6e3'; return '#eaf3fc'; }

// ===== UI =====
function depthOf(d){ let n=0,cur=d; while(cur&&cur.parent&&BYID[cur.parent]){ n++; cur=BYID[cur.parent]; } return n; }
function buildSelect(){
  const sel=document.getElementById('selSet'); sel.innerHTML='';
  const blank=document.createElement('option'); blank.value=''; blank.textContent='（カスタム：下の定義JSONを直接編集）'; sel.appendChild(blank);
  LIBRARY.forEach(d=>{ const o=document.createElement('option'); o.value=d.id; const dep=depthOf(d);
    o.textContent=(dep?'　'.repeat(dep)+'└ ':'')+d.id+'  —  '+d.theme; sel.appendChild(o); });
}
function defWithoutData(def){const {data, ...rest}=def; return rest;}
function clearAll(){ CTX=null; RESULTS=[];
  document.getElementById('def').value=''; document.getElementById('input').value='';
  document.getElementById('colHint').textContent='列順: （定義適用後に表示）';
  document.getElementById('crumb').innerHTML=''; document.getElementById('defErr').textContent='';
  document.getElementById('out').innerHTML='<div class="card note-s">ライブラリから選ぶか、定義JSONを記述して「✅ 定義を適用」→「🔍 評価実行」してください。</div>';
}
function onSelect(){ const v=document.getElementById('selSet').value; if(!v){ clearAll(); return; } loadRuleset(v); }
function loadRuleset(id){
  const def=BYID[id]; if(!def) return;
  document.getElementById('def').value=JSON.stringify(defWithoutData(def),null,2);
  document.getElementById('input').value=(def.data||[]).map(r=>r.join('\t')).join('\n');
  document.getElementById('selSet').value=id;
  applyDef();
  RESULTS=[]; document.getElementById('out').innerHTML='<div class="card note-s">「🔍 評価実行」を押すと判定結果を表示します。</div>';
}
function applyDef(){
  const errBox=document.getElementById('defErr'); errBox.textContent='';
  let def; try{ def=JSON.parse(document.getElementById('def').value); }catch(e){ errBox.textContent='JSON構文エラー: '+e.message; return false; }
  if(!Array.isArray(def.columns)||!def.columns.length){ errBox.textContent='columns（列名配列）が必要です。'; return false; }
  try{ CTX=compileDef(def); }catch(e){ errBox.textContent=e.message; return false; }
  document.getElementById('colHint').textContent='列順: '+CTX.cols.join(', ')
    +(CTX.roleKeys.length?'　／ roles: '+CTX.roleKeys.map(k=>k+'→'+CTX.roleMap[k]).join(', '):'')
    +(def.template?'　／ template: '+def.template:'');
  renderCrumb();
  errBox.style.color='#2f9e5f'; errBox.textContent='✔ 定義を適用しました（ルール'+CTX.compiled.length+'件・レベル'+CTX.levels.length+'段階）';
  setTimeout(()=>{errBox.textContent='';errBox.style.color='';},2500);
  return true;
}
function renderCrumb(){
  const c=document.getElementById('crumb'); const id=CTX&&CTX.def&&CTX.def.id;
  if(!id||!BYID[id]){ c.innerHTML='<i>カスタム定義</i>'; return; }
  const chain=[]; let cur=BYID[id]; while(cur){ chain.unshift(cur); cur=cur.parent?BYID[cur.parent]:null; }
  c.innerHTML='階層: '+chain.map((d,i)=> i<chain.length-1?`<a onclick="loadRuleset('${d.id}')">${d.id}</a>`:`<b>${d.id}</b>`).join(' ＞ ');
}
function parseInput(){
  const lines=document.getElementById('input').value.trim().split('\n').filter(l=>l.trim());
  return lines.map(l=>{const c=l.includes('\t')?l.split('\t'):l.split(',');const o={};CTX.cols.forEach((k,i)=>o[k]=(c[i]||'').trim());return o;});
}
function runAudit(){ if(!CTX){ if(!applyDef()) return; } const rows=parseInput();
  const out=document.getElementById('out'); if(!rows.length){ out.innerHTML='<div class="card">データがありません。</div>'; return; }
  RESULTS=runRows(CTX,rows); render(); }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const org=document.getElementById('cfgOrg').value||'';
  const theme=CTX.theme, levels=CTX.levels, total=levels.length;
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'});
  const cnt={}; levels.forEach(l=>cnt[l]=0); RESULTS.forEach(a=>cnt[a.grade]++);
  // 総合結論＝最悪値
  let concl=levels[0],ci=0; RESULTS.forEach(a=>{const k=levels.indexOf(a.grade);if(k>ci){ci=k;concl=a.grade;}});

  let h=`<div class="card"><h2>📊 評価結果サマリー（${RESULTS.length}項目）<span style="font-weight:400;font-size:.78rem;color:var(--muted)">／ ${esc(theme)}</span></h2><div class="dash">`;
  h+=`<div class="kpi" style="background:#54657a"><div class="n">${RESULTS.length}</div><div class="l">項目数</div></div>`;
  levels.forEach((l,i)=>{ h+=`<div class="kpi" style="background:${colorFor(i,total)}"><div class="n">${cnt[l]}</div><div class="l">${esc(l)}</div></div>`; });
  h+=`</div><div class="note-s">総合結論（最も低い達成度で集約）：<b style="color:${colorFor(ci,total)}">${esc(concl)}</b></div></div>`;

  // 階層ロールアップ
  const id=CTX.def.id; const children=id?LIBRARY.filter(d=>d.parent===id):[];
  if(children.length){
    h+=`<div class="card"><h2>🧭 階層ロールアップ（子階層の集約達成度）</h2><div class="tablewrap"><table><thead><tr><th>子階層</th><th>項目</th><th>集約達成度</th><th>内訳</th><th></th></tr></thead><tbody>`;
    children.forEach(cd=>{ let cx; try{ cx=compileDef(cd); }catch(e){ return; }
      const res=runRows(cx,rowsFromData(cx,cd.data||[]));
      const cc={}; cx.levels.forEach(l=>cc[l]=0); res.forEach(a=>cc[a.grade]++);
      let worst=cx.levels[0],wi=0; res.forEach(a=>{const k=cx.levels.indexOf(a.grade);if(k>wi){wi=k;worst=a.grade;}});
      h+=`<tr><td>${esc(cd.theme)}<br><span style="color:var(--muted);font-size:.72rem">${cd.id}</span></td>
        <td style="text-align:right">${res.length}</td>
        <td><span class="badge" style="background:${colorFor(wi,cx.levels.length)}">${esc(worst)}</span></td>
        <td style="font-size:.72rem">${cx.levels.map(l=>l+':'+cc[l]).join('  ')}</td>
        <td><button class="mini" onclick="loadRuleset('${cd.id}')">開く ▶</button></td></tr>`;
    });
    h+=`</tbody></table></div><div class="note-s">※ 親の達成度は子階層の最も低い達成度で集約。各子は自身のサンプルで評価。</div></div>`;
  }

  // 判定一覧
  const idCol=CTX.cols[0]; const dispCols=CTX.display.filter(c=>c!==idCol);
  h+=`<div class="card"><h2>📋 適合性判定一覧</h2><div class="tablewrap"><table><thead><tr><th>${esc(idCol)}</th><th>達成度</th>`;
  dispCols.forEach(c=>h+=`<th>${esc(c)}</th>`); h+=`<th>指摘（不適合・部分適合の根拠）</th></tr></thead><tbody>`;
  RESULTS.forEach(a=>{ const gi=levels.indexOf(a.grade);
    h+=`<tr style="background:${lightFor(gi,total)}"><td>${esc(a.row[idCol])}</td><td><span class="badge" style="background:${colorFor(gi,total)}">${esc(a.grade)}</span></td>`;
    dispCols.forEach(c=>h+=`<td>${esc(a.row[c])}</td>`);
    h+=`<td>${a.flags.length?`<span class="flags">${a.flags.map(esc).join('、')}</span>`:'<span style="color:#2f9e5f">✔ 全般的に適合</span>'}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;

  // 確認書（疑義＝最良レベル以外）
  const flagged=RESULTS.filter(a=>a.grade!==levels[0]);
  h+=`<div class="card"><h2>🧾 是正確認書（部分的に適合・不適合 ${flagged.length}件）</h2>`;
  if(flagged.length) h+=`<div class="btns"><button onclick="downloadConfCsv()">⬇ 確認書CSV</button><button onclick="downloadConfExcel()">⬇ 確認書Excel</button></div>`;
  if(!flagged.length) h+='<div class="note-s">指摘事項はありません（全般的に適合）。</div>';
  CONFIRMATIONS=[];
  flagged.forEach(a=>{ const r=a.row, gi=levels.indexOf(a.grade);
    const qs=a.questions.length?a.questions.slice():['当該項目の適合状況について補足の説明をご回答ください。'];
    const detail=CTX.cols.map(c=>`${c}：${r[c]||'（空欄）'}`).join(' ／ ');
    CONFIRMATIONS.push({date:today,theme,org,id:r[idCol],grade:a.grade,flags:a.flags.join('、'),detail,questions:qs.slice()});
    const ANS='\n      ご回答：______________________________________________';
    h+=`<div class="conf" style="border-left-color:${colorFor(gi,total)}"><div class="ch">【内部評価 是正確認書（被評価部門 ご回答用）】 ${esc(theme)}</div>`+
`■ 1. 対象
  確認書発行日：${today}　／　発行：品質評価担当
  評価対象：${esc(org)||'（内部監査部門）'}
  対象番号：${esc(r[idCol])}
  項目：${esc(detail)}

■ 2. 評価者の所見
  達成度：${esc(a.grade)}　／　指摘区分：${esc(a.flags.join('、'))}

■ 3. ご確認・ご回答いただきたい事項
${qs.map((x,i)=>`  Q${i+1}. ${esc(x)}${ANS}`).join('\n\n')}

■ 4. ご提示をお願いする証拠（適合の証拠／該当に☑）
  □ 規程・基本規程　□ 監査計画・調書　□ 自己評価記録・QAIP　□ 報告書・改善措置の記録

ご回答期限：　　　年　　月　　日　／　ご回答者（所属・氏名）：________________</div>`;
  });
  h+=`</div>`;
  document.getElementById('out').innerHTML=h;
}

// ===== 入出力 =====
function reRender(){ if(RESULTS.length) render(); }
function loadCsv(ev){ const f=ev.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ document.getElementById('input').value=String(rd.result).replace(/^﻿/,'').trim();
    RESULTS=[]; document.getElementById('out').innerHTML='<div class="card note-s">CSVを取り込みました。「🔍 評価実行」を押してください。</div>'; };
  rd.readAsText(f,'UTF-8'); ev.target.value=''; }
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function downloadCsv(){ if(!RESULTS.length){ alert('先に評価を実行してください'); return; }
  const head=[...CTX.cols,'達成度','指摘']; const rows=RESULTS.map(a=>[...CTX.cols.map(c=>a.row[c]),a.grade,a.flags.join('；')]);
  const csv='﻿'+[head,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'internal_evaluation_results.csv'); }
function downloadConfCsv(){ if(!CONFIRMATIONS.length){ alert('指摘事項がありません'); return; }
  const head=['発行日','評価テーマ','対象番号','評価対象','達成度','指摘区分','項目内容','質問No','質問内容','ご回答','回答期限','ご回答者','提示証拠'];
  const ev='□規程 □監査計画・調書 □自己評価/QAIP □報告書/改善措置'; const rows=[];
  CONFIRMATIONS.forEach(c=>c.questions.forEach((q,i)=>rows.push([c.date,c.theme,c.id,c.org,c.grade,c.flags,c.detail,'Q'+(i+1),q,'','','',i===0?ev:''])));
  const csv='﻿'+[head,...rows].map(r=>r.map(x=>`"${String(x==null?'':x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'内部評価_是正確認書.csv'); }
function downloadConfExcel(){ if(!CONFIRMATIONS.length){ alert('指摘事項がありません'); return; }
  const row=(k,v)=>`<tr><td style="background:#f1f5fa;font-weight:bold;white-space:nowrap">${esc(k)}</td><td>${esc(v)}</td></tr>`; let t='';
  CONFIRMATIONS.forEach(c=>{ t+=`<tr><td colspan="2" style="background:#15436f;color:#fff;font-weight:bold;font-size:12pt">内部評価 是正確認書　${esc(c.theme)}　${esc(c.id)}　［${esc(c.grade)}］</td></tr>`;
    t+=row('発行日',c.date+' ／ 発行：品質評価担当'); t+=row('評価対象',c.org); t+=row('対象番号',c.id); t+=row('項目内容',c.detail);
    t+=row('達成度／指摘区分',c.grade+' ／ '+c.flags);
    t+=`<tr><td colspan="2" style="background:#dde7f0;font-weight:bold">ご確認・ご回答いただきたい事項</td></tr>`;
    c.questions.forEach((q,i)=>t+=`<tr><td style="vertical-align:top;width:58%">Q${i+1}. ${esc(q)}</td><td style="height:54px;background:#fffdf2">ご回答：</td></tr>`);
    t+=`<tr><td colspan="2">提示証拠：□ 規程　□ 監査計画・調書　□ 自己評価/QAIP　□ 報告書/改善措置</td></tr>`;
    t+=`<tr><td>ご回答期限：　　　年　　月　　日</td><td>ご回答者（所属・氏名）：</td></tr>`;
    t+=`<tr><td colspan="2" style="border:none;height:10px"></td></tr>`; });
  const html=`<html><head><meta charset="utf-8"><style>table{border-collapse:collapse}td{border:1px solid #b8c4d0;padding:5px 8px;font-size:10.5pt;font-family:'Meiryo UI','Yu Gothic',sans-serif;vertical-align:top}</style></head><body><table>${t}</table></body></html>`;
  dl(new Blob(['﻿'+html],{type:'application/vnd.ms-excel'}),'内部評価_是正確認書.xls'); }

// ===== 初期化 =====
buildSelect();
loadRuleset('ia-all');
</script>
