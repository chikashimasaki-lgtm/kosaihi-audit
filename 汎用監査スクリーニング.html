<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汎用監査スクリーニング</title>
<style>
  :root{
    --bg:#eef2f6;--panel:#fff;--panel2:#f3f6fa;--line:#d7e0e8;--txt:#27313c;--muted:#67768a;
    --accent:#1f5f9e;--accentd:#15436f;
    --ok:#2f9e5f;--note:#2b7fd0;--minor:#e0a000;--major:#d8443b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Meiryo UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;padding:16px;font-size:14px}
  .wrap{max-width:1100px;margin:0 auto}
  header{background:linear-gradient(135deg,var(--accent),var(--accentd));color:#fff;
    border-radius:12px;padding:16px 20px;border-bottom:3px solid #c8102e;box-shadow:0 2px 8px rgba(20,60,100,.2)}
  header h1{font-size:1.2rem}
  header p{font-size:.78rem;opacity:.9;margin-top:3px}
  .notice{background:#fff7e6;border:1px solid #f0c36d;border-left:4px solid #e0a000;
    border-radius:10px;padding:11px 14px;margin-top:12px;font-size:.82rem;color:#7a5b00;line-height:1.6}
  .notice b{color:#a06a00}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    margin-top:12px;box-shadow:0 1px 3px rgba(20,50,80,.05)}
  .card h2{font-size:.95rem;color:var(--accentd);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .cfg{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:.82rem}
  .cfg label{display:flex;align-items:center;gap:6px}
  .cfg input{width:120px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:.85rem}
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;
    font-family:ui-monospace,Consolas,monospace;font-size:.78rem;resize:vertical;white-space:pre}
  #rules{height:200px}#input{height:120px}
  .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  button{cursor:pointer;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:.85rem;
    background:#fff;color:var(--txt);font-weight:600}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:var(--accentd);color:#fff}
  .note-s{font-size:.74rem;color:var(--muted);margin-top:6px}
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .kpi{border-radius:9px;padding:10px;text-align:center;color:#fff}
  .kpi .n{font-size:1.5rem;font-weight:800;line-height:1.1}
  .kpi .l{font-size:.72rem;opacity:.95}
  .kpi.ok{background:var(--ok)}.kpi.note{background:var(--note)}.kpi.minor{background:var(--minor)}
  .kpi.major{background:var(--major)}.kpi.total{background:#54657a}
  table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:4px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{background:var(--accentd);color:#fff;position:sticky;top:0;white-space:nowrap}
  tr.major{background:#fdecea}tr.minor{background:#fdf6e3}tr.note{background:#eaf3fc}
  .tablewrap{overflow:auto;max-height:420px;border-radius:8px;border:1px solid var(--line)}
  .badge{display:inline-block;padding:2px 8px;border-radius:11px;font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap}
  .b-ok{background:var(--ok)}.b-note{background:var(--note)}.b-minor{background:var(--minor)}.b-major{background:var(--major)}
  .flags{font-size:.72rem;color:var(--major)}
  .conf{border:1px solid var(--line);border-left:4px solid var(--major);border-radius:8px;
    padding:12px 14px;margin-top:10px;background:#fff;font-size:.82rem;white-space:pre-wrap}
  .conf.note{border-left-color:var(--note)}.conf.minor{border-left-color:var(--minor)}
  .conf .ch{font-weight:700;color:var(--accentd);font-size:.9rem;margin-bottom:6px}
  .err{color:var(--major);font-size:.78rem;margin-top:6px;white-space:pre-wrap}
  footer{color:var(--muted);font-size:.72rem;text-align:center;margin-top:16px}
  .legend{font-size:.72rem;color:var(--muted);margin-top:6px;line-height:1.6}
  code{background:#eef2f6;padding:1px 5px;border-radius:4px;font-family:Consolas,monospace}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛡️ 汎用監査スクリーニング</h1>
    <p>監査項目・判定ルールをJSONで自由定義 → 全件をルールベースで自動判定 → 疑義のみ監査内容確認書を出力</p>
  </header>

  <div class="notice">
    ⚠ <b>本ツールはデモアプリです</b>。判定はすべて<b>端末内のルールベース計算（数式）</b>で行っており、<b>AI・外部APIは一切使用していません</b>。入力データが外部へ送信されることはありません。
  </div>

  <div class="card">
    <h2>📋 確認書ヘッダ設定</h2>
    <div class="cfg">
      <label>監査テーマ <input id="cfgTheme" type="text" value="決裁権限逸脱（職務権限規程）スクリーニング" style="width:280px" oninput="reRender()"></label>
      <label>監査対象組織 <input id="cfgOrg" type="text" value="営業本部" style="width:200px" oninput="reRender()"></label>
    </div>
  </div>

  <div class="card">
    <h2>⚙️ 判定ルール定義（JSON）</h2>
    <textarea id="rules" spellcheck="false"></textarea>
    <div class="btns">
      <button onclick="applyRules()">✅ ルール適用</button>
      <button onclick="loadSampleRules()">📋 サンプルルール</button>
    </div>
    <div id="ruleErr" class="err"></div>
  </div>

  <div class="card">
    <h2>📥 入力データ（タブ／カンマ区切り・1行1件）</h2>
    <div class="note-s" id="colHint">列順: （ルール適用後に表示）</div>
    <textarea id="input" spellcheck="false"></textarea>
    <div class="btns">
      <button class="primary" onclick="runAudit()">🔍 監査実行</button>
      <button onclick="loadSampleData()">📋 サンプルデータ投入</button>
      <button onclick="document.getElementById('input').value=''">クリア</button>
      <button onclick="downloadCsv()">⬇ 結果CSV</button>
    </div>
  </div>

  <div id="out"></div>

  <footer>本ツールは一次スクリーニング用。最終判定は専門家・原資料で確認してください。判定は定義ルールに対する機械判定です。</footer>
</div>

<script>
// ===== サンプルルール（権限逸脱：決裁権限・職務権限規程違反）=====
const SAMPLE_RULES = {
  "columns": ["申請ID","日付","部署","申請者","取引先","金額","承認者","承認役職","承認限度額","備考"],
  "display": ["申請ID","部署","金額","承認者","承認役職","承認限度額"],
  "rules": [
    {"name":"承認限度額超過(権限逸脱)","when":"!empty(承認限度額) && 金額 > 承認限度額","level":"要改善",
     "question":"承認者の決裁権限限度額（承認限度額）を超える金額を承認しています。職務権限規程に基づく上位者の決裁を経ましたか。権限逸脱に至った経緯と是正状況をご回答ください。"},
    {"name":"自己承認(職務分掌違反)","when":"!empty(承認者) && 申請者==承認者","level":"要改善",
     "question":"申請者と承認者が同一人物です（自己承認）。職務分掌（申請と承認の分離）に反します。第三者の承認を経なかった理由をご説明ください。"},
    {"name":"承認者不在","when":"empty(承認者)","level":"要改善",
     "question":"承認者が記録されていません。決裁手続を経たか、承認の証跡をご提示のうえ経緯をご説明ください。"},
    {"name":"分割発注疑い(限度額直下)","when":"!empty(承認限度額) && 金額 >= 承認限度額*0.9 && 金額 < 承認限度額","level":"注意",
     "question":"承認限度額の直下（90%以上）の金額です。上位決裁を回避するための分割発注に該当しないか、発注の一体性・分割理由をご回答ください。"},
    {"name":"一般職による高額承認","when":"(inc(承認役職,\"担当\") || inc(承認役職,\"主任\")) && 金額 > 100000","level":"要改善(軽微)",
     "question":"一般職（担当・主任）が10万円を超える支出を承認しています。当該役職に承認権限があるか、職務権限規程上の根拠をご回答ください。"}
  ]
};

// ===== サンプルデータ（権限逸脱パターン）=====
const SAMPLE_DATA = [
 ["REQ-101","2026-06-01","購買部","佐藤","山田商事",250000,"田中課長","課長",300000,"複合機リース"],
 ["REQ-102","2026-06-02","営業1課","鈴木","ABC社",150000,"高橋係長","係長",100000,"展示会出展費"],
 ["REQ-103","2026-06-03","総務部","渡辺","オフィス商会",80000,"渡辺","課長",300000,"備品購入"],
 ["REQ-104","2026-06-04","開発部","伊藤","部品商事",290000,"山本課長","課長",300000,"試作部材"],
 ["REQ-105","2026-06-05","営業2課","中村","テック社",120000,"","",100000,"開発機材"],
 ["REQ-106","2026-06-06","購買部","小林","文具センター",120000,"加藤担当","担当",50000,"消耗品まとめ買い"],
 ["REQ-107","2026-06-07","経理部","松本","監査法人",800000,"吉田部長","部長",1000000,"監査報酬"],
 ["REQ-108","2026-06-08","営業3課","井上","料亭花月",95000,"林課長","課長",100000,"取引先接待"],
 ["REQ-109","2026-06-09","人事部","清水","研修会社",350000,"木村課長","課長",300000,"新人研修"],
 ["REQ-110","2026-06-10","開発部","山口","システム社",480000,"井上係長","係長",100000,"ソフト導入"]
];

let RULESET=null, COLS=[], DISPLAY=[], COMPILED=[];
const HELP_NAMES=["inc","empty","N","days"];

function getHelpers(){
  return {
    inc:(s,sub)=>String(s==null?'':s).includes(sub),
    empty:(s)=>!String(s==null?'':s).trim(),
    N:(s)=>Number(String(s==null?'':s).replace(/[,\s]/g,''))||0,
    days:(a,b)=>{const d=Math.round((new Date(a)-new Date(b))/86400000);return isNaN(d)?0:d;}
  };
}
const LEVELS=["適正","注意","要改善(軽微)","要改善"];
const GMAP={"適正":"ok","注意":"note","要改善(軽微)":"minor","要改善":"major"};

function loadSampleRules(){
  document.getElementById('rules').value=JSON.stringify(SAMPLE_RULES,null,2);
  applyRules();
}
function loadSampleData(){
  if(!COLS.length){ applyRules(); }
  document.getElementById('input').value=SAMPLE_DATA.map(r=>r.join('\t')).join('\n');
}

function applyRules(){
  const errBox=document.getElementById('ruleErr'); errBox.textContent='';
  let json;
  try{ json=JSON.parse(document.getElementById('rules').value); }
  catch(e){ errBox.textContent='JSON構文エラー: '+e.message; return false; }
  if(!Array.isArray(json.columns)||!json.columns.length){ errBox.textContent='columns（列名の配列）が必要です。'; return false; }
  if(!Array.isArray(json.rules)){ errBox.textContent='rules（ルールの配列）が必要です。'; return false; }
  RULESET=json; COLS=json.columns.slice();
  // 判定一覧の表示列（JSONのdisplayに従う。未指定なら全列）
  if(Array.isArray(json.display) && json.display.length){
    const unknown=json.display.filter(c=>!COLS.includes(c));
    if(unknown.length){ errBox.textContent='display に未定義の列があります: '+unknown.join(', '); return false; }
    DISPLAY=json.display.slice();
  } else {
    DISPLAY=COLS.slice();
  }
  // コンパイル
  COMPILED=[];
  const argNames=[...COLS,...HELP_NAMES];
  for(const ru of json.rules){
    if(!ru.when){ COMPILED.push({rule:ru,fn:()=>false}); continue; }
    if(!LEVELS.includes(ru.level)){ errBox.textContent='level は '+LEVELS.slice(1).join('／')+' のいずれか: ルール「'+(ru.name||'')+'」'; return false; }
    try{
      const fn=new Function(...argNames,'return ('+ru.when+');');
      COMPILED.push({rule:ru,fn});
    }catch(e){ errBox.textContent='条件式エラー（ルール「'+(ru.name||'')+'」）: '+e.message; return false; }
  }
  document.getElementById('colHint').textContent='列順: '+COLS.join(', ');
  errBox.style.color='var(--ok)'; errBox.textContent='✔ ルール適用OK（'+json.rules.length+'件）';
  setTimeout(()=>{errBox.textContent='';errBox.style.color='';},2500);
  return true;
}

function parseInput(){
  const lines=document.getElementById('input').value.trim().split('\n').filter(l=>l.trim());
  return lines.map(l=>{
    const c=l.includes('\t')?l.split('\t'):l.split(',');
    const o={}; COLS.forEach((k,i)=>o[k]=(c[i]||'').trim()); return o;
  });
}

function toScope(row){
  const h=getHelpers();
  const vals=COLS.map(c=>{
    const t=(row[c]||'').trim();
    return (t!=='' && /^-?\d+(\.\d+)?$/.test(t)) ? Number(t) : row[c];
  });
  return [...vals,h.inc,h.empty,h.N,h.days];
}

function audit(row){
  const matched=[];
  const args=toScope(row);
  for(const c of COMPILED){
    let hit=false;
    try{ hit=!!c.fn(...args); }catch(e){ hit=false; }
    if(hit) matched.push(c.rule);
  }
  // 最重格付け
  let grade="適正", gi=0;
  matched.forEach(r=>{ const idx=LEVELS.indexOf(r.level); if(idx>gi){gi=idx; grade=r.level;} });
  const flags=matched.map(r=>r.name);
  const questions=matched.filter(r=>r.question).map(r=>r.question);
  return {row,matched,grade,flags,questions};
}

let RESULTS=[], CONFIRMATIONS=[];

// 確認書ヘッダ設定（監査テーマ・監査対象組織）の変更を確認書へ即時反映
function reRender(){ if(RESULTS.length) render(); }

function runAudit(){
  if(!COLS.length){ if(!applyRules()) return; }
  const rows=parseInput();
  const out=document.getElementById('out');
  if(!rows.length){ out.innerHTML='<div class="card">データがありません。「サンプルデータ投入」を押すか入力してください。</div>'; return; }
  RESULTS=rows.map(audit);
  render();
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const theme=document.getElementById('cfgTheme').value||'監査スクリーニング';
  const org=document.getElementById('cfgOrg').value||'';
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'});
  const cnt={"適正":0,"注意":0,"要改善(軽微)":0,"要改善":0};
  RESULTS.forEach(a=>cnt[a.grade]++);
  let h=`<div class="card"><h2>📊 監査結果サマリー（${RESULTS.length}件）</h2><div class="dash">
    <div class="kpi total"><div class="n">${RESULTS.length}</div><div class="l">総件数</div></div>
    <div class="kpi ok"><div class="n">${cnt["適正"]}</div><div class="l">🟩 適正</div></div>
    <div class="kpi note"><div class="n">${cnt["注意"]}</div><div class="l">🟦 注意</div></div>
    <div class="kpi minor"><div class="n">${cnt["要改善(軽微)"]}</div><div class="l">🟨 要改善(軽微)</div></div>
    <div class="kpi major"><div class="n">${cnt["要改善"]}</div><div class="l">🟥 要改善</div></div>
  </div></div>`;

  // 一覧テーブル（先頭ID列＝最初の列、評価、JSON定義の表示列、検知フラグ）
  const idCol=COLS[0];
  const dispCols=DISPLAY.filter(c=>c!==idCol);   // ID列は先頭固定のため除外
  h+=`<div class="card"><h2>📋 判定一覧</h2><div class="tablewrap"><table><thead><tr>
    <th>${esc(idCol)}</th><th>評価</th>`;
  dispCols.forEach(c=>h+=`<th>${esc(c)}</th>`);
  h+=`<th>検知フラグ</th></tr></thead><tbody>`;
  RESULTS.forEach(a=>{
    const cls=GMAP[a.grade];
    h+=`<tr class="${cls}"><td>${esc(a.row[idCol])}</td><td><span class="badge b-${cls}">${a.grade}</span></td>`;
    dispCols.forEach(c=>h+=`<td>${esc(a.row[c])}</td>`);
    h+=`<td>${a.flags.length?`<span class="flags">${a.flags.map(esc).join('、')}</span>`:'<span style="color:#2f9e5f">✔ 適正</span>'}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;

  // 確認書（疑義のみ）
  const flagged=RESULTS.filter(a=>a.grade!=='適正');
  h+=`<div class="card"><h2>🧾 監査内容確認書（疑義 ${flagged.length}件・適正は自動スルー）</h2>`;
  if(flagged.length) h+=`<div class="btns"><button onclick="downloadConfCsv()">⬇ 確認書CSV</button><button onclick="downloadConfExcel()">⬇ 確認書Excel</button></div>`;
  if(!flagged.length) h+='<div class="note-s">疑義案件はありません。全件適正です。</div>';
  CONFIRMATIONS=[];
  flagged.forEach(a=>{
    const cls=GMAP[a.grade];
    const r=a.row, idCol=COLS[0];
    const qs=a.questions.length?a.questions.slice():['本案件の内容・経緯について補足の説明をご回答ください。'];
    const detail=COLS.map(c=>`${c}：${r[c]||'（空欄）'}`).join(' ／ ');
    CONFIRMATIONS.push({date:today,theme,org,id:r[idCol],grade:a.grade,
      flags:a.flags.join('、'),detail,questions:qs.slice()});
    const ANS='\n      ご回答：______________________________________________';
    h+=`<div class="conf ${cls}"><div class="ch">【監査内容確認書（被監査部門 ご回答用）】 ${esc(theme)}</div>`+
`■ 1. 対象案件
  確認書発行日：${today}　／　発行：内部監査部
  監査対象組織：${esc(org)||'（　　　　　　　　）'}
  対象ID：${esc(r[idCol])}
  案件内容：${esc(detail)}

■ 2. 監査人の所見（ご確認をお願いする背景）
  総合評価：${esc(a.grade)}　／　指摘区分：${esc(a.flags.join('、'))}

■ 3. ご確認・ご回答いただきたい事項（被監査部門ご記入）
${qs.map((x,i)=>`  Q${i+1}. ${esc(x)}${ANS}`).join('\n\n')}

■ 4. ご提示をお願いする証跡（該当に☑）
  □ 証憑（領収書・請求書・契約書等）　□ 承認記録（決裁書）　□ 関連資料（見積・議事録等）

ご回答期限：　　　年　　月　　日　／　ご回答者（所属・氏名）：________________</div>`;
  });
  h+=`</div>`;
  document.getElementById('out').innerHTML=h;
}

function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

function downloadCsv(){
  if(!RESULTS.length){ alert('先に監査を実行してください'); return; }
  const head=[...COLS,'総合評価','検知フラグ'];
  const rows=RESULTS.map(a=>[...COLS.map(c=>a.row[c]),a.grade,a.flags.join('；')]);
  const csv='﻿'+[head,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'screening_results.csv');
}

function downloadConfCsv(){
  if(!CONFIRMATIONS.length){ alert('疑義案件がありません'); return; }
  const head=['確認書発行日','監査テーマ','対象ID','監査対象組織','総合評価','指摘区分','案件内容','質問No','質問内容','ご回答','回答期限','ご回答者','提示証跡'];
  const ev='□証憑 □承認記録 □関連資料';
  const rows=[];
  CONFIRMATIONS.forEach(c=>c.questions.forEach((q,i)=>{
    rows.push([c.date,c.theme,c.id,c.org,c.grade,c.flags,c.detail,'Q'+(i+1),q,'','','',i===0?ev:'']);
  }));
  const csv='﻿'+[head,...rows].map(r=>r.map(x=>`"${String(x==null?'':x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(new Blob([csv],{type:'text/csv'}),'監査内容確認書.csv');
}

function downloadConfExcel(){
  if(!CONFIRMATIONS.length){ alert('疑義案件がありません'); return; }
  const row=(k,v)=>`<tr><td style="background:#f1f5fa;font-weight:bold;white-space:nowrap">${esc(k)}</td><td>${esc(v)}</td></tr>`;
  let t='';
  CONFIRMATIONS.forEach(c=>{
    t+=`<tr><td colspan="2" style="background:#15436f;color:#fff;font-weight:bold;font-size:12pt">監査内容確認書（被監査部門 ご回答用）　${esc(c.theme)}　${esc(c.id)}　［${esc(c.grade)}］</td></tr>`;
    t+=row('確認書発行日',c.date+' ／ 発行：内部監査部');
    t+=row('監査対象組織',c.org);
    t+=row('対象ID',c.id);
    t+=row('案件内容',c.detail);
    t+=row('総合評価／指摘区分',c.grade+' ／ '+c.flags);
    t+=`<tr><td colspan="2" style="background:#dde7f0;font-weight:bold">ご確認・ご回答いただきたい事項（被監査部門ご記入）</td></tr>`;
    c.questions.forEach((q,i)=>{
      t+=`<tr><td style="vertical-align:top;width:58%">Q${i+1}. ${esc(q)}</td><td style="height:54px;background:#fffdf2">ご回答：</td></tr>`;
    });
    t+=`<tr><td colspan="2">提示証跡（該当に☑）：□ 証憑　□ 承認記録　□ 関連資料</td></tr>`;
    t+=`<tr><td>ご回答期限：　　　年　　月　　日</td><td>ご回答者（所属・氏名）：</td></tr>`;
    t+=`<tr><td colspan="2" style="border:none;height:10px"></td></tr>`;
  });
  const html=`<html><head><meta charset="utf-8"><style>table{border-collapse:collapse}td{border:1px solid #b8c4d0;padding:5px 8px;font-size:10.5pt;font-family:'Meiryo UI','Yu Gothic',sans-serif;vertical-align:top}</style></head><body><table>${t}</table></body></html>`;
  dl(new Blob(['﻿'+html],{type:'application/vnd.ms-excel'}),'監査内容確認書.xls');
}
